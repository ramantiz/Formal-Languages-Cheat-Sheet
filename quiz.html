<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSCI 272 Practice Exam</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --yellow: #d29922;
  --purple: #bc8cff;
  --orange: #f0883e;
  --cyan: #39d353;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}
.progress-bar {
  position: fixed; top:0; left:0; right:0; height:4px; background: var(--border); z-index:200;
}
.progress-fill {
  height:100%; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width 0.3s;
}
.progress-text {
  position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted);
  background: var(--card); padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border); z-index: 200;
}
.container { max-width: 720px; margin: 0 auto; padding: 60px 16px 40px; }
h1 {
  font-family: 'JetBrains Mono', monospace; font-size: 24px; text-align: center; margin-bottom: 6px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.subtitle { text-align: center; color: var(--muted); margin-bottom: 28px; font-size: 14px; }
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; margin-bottom: 20px;
}
.q-section {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--purple);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.q-number {
  font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); margin-bottom: 4px;
}
.q-type {
  display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px;
  font-weight: 600; font-family: 'JetBrains Mono', monospace; margin-left: 8px;
}
.q-type.single { background: rgba(88,166,255,0.15); color: var(--blue); }
.q-type.multi { background: rgba(210,153,34,0.15); color: var(--yellow); }
.q-text { font-size: 17px; font-weight: 600; margin-bottom: 18px; line-height: 1.5; }
.option {
  display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px;
  background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
}
.option:hover { border-color: var(--blue); background: rgba(88,166,255,0.04); }
.option.selected { border-color: var(--blue); background: rgba(88,166,255,0.08); }
.option.correct { border-color: var(--green); background: rgba(63,185,80,0.1); }
.option.wrong { border-color: var(--red); background: rgba(248,81,73,0.1); }
.option.missed { border-color: var(--yellow); background: rgba(210,153,34,0.08); }
.option.locked { cursor: default; pointer-events: none; }
.option input { margin-top: 3px; accent-color: var(--blue); flex-shrink: 0; }
.option-label { font-size: 15px; }
.explanation {
  margin-top: 16px; padding: 14px; border-radius: 8px;
  background: rgba(88,166,255,0.06); border: 1px solid rgba(88,166,255,0.15);
  font-size: 14px; color: var(--muted); line-height: 1.6; display: none;
}
.explanation.show { display: block; }
.explanation strong { color: var(--text); }
.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn {
  padding: 10px 24px; border-radius: 8px; font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--blue); }
.btn-danger {
  background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid rgba(248,81,73,0.3);
}
.btn-danger:hover { background: rgba(248,81,73,0.25); }
.hidden { display: none !important; }
/* Results */
.results-card { text-align: center; }
.score-big {
  font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 700;
  background: linear-gradient(135deg, var(--green), var(--blue));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.score-label { font-size: 18px; color: var(--muted); margin-bottom: 20px; }
.result-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-bottom: 1px solid rgba(48,54,61,0.5); text-align: left; font-size: 14px;
}
.result-item:last-child { border-bottom: none; }
.result-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
.result-text { flex: 1; }
.start-screen { text-align: center; padding: 40px 20px; }
.start-screen p { color: var(--muted); margin-bottom: 20px; font-size: 15px; }
@media (max-width: 600px) {
  .container { padding: 56px 10px 30px; }
  .card { padding: 16px; }
  .q-text { font-size: 15px; }
  .option { padding: 10px; }
  .option-label { font-size: 14px; }
  .btn { padding: 12px 20px; width: 100%; text-align: center; }
  .btn-row { flex-direction: column; }
  .score-big { font-size: 48px; }
}
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="progress-text" id="progressText">0 / 30</div>

<div class="container" id="app">
  <h1>CSCI 272 Practice Exam</h1>
  <p class="subtitle">30 Questions — Undecidability, Recognizability, Reductions, Rice's Theorem</p>

  <div class="card start-screen" id="startScreen">
    <h2 style="margin-bottom:12px; font-family:'JetBrains Mono',monospace; color:var(--blue);">Ready?</h2>
    <p>30 questions covering all major topics. Your progress is saved automatically.</p>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn btn-primary" onclick="startQuiz()">Start Exam</button>
      <button class="btn btn-danger hidden" id="resetBtn" onclick="resetQuiz()">Reset Progress</button>
    </div>
  </div>

  <div id="questionArea" class="hidden"></div>
  <div id="resultsArea" class="hidden"></div>
</div>

<script>
const QUESTIONS=[{section:"Decidability & Recognizability",type:"multi",question:"Which of the following statements are TRUE? (Select all that apply)",options:["The power set of a finite set is undecidable","The complement of a finite set is decidable","Every finite set is Turing-recognizable","The complement of an undecidable language is not Turing-recognizable","The complement of a recognizable language is also recognizable","The language { \u27E8p\u27E9 | p is a prime number } is co-Turing-recognizable"],correct:[1,2,5],explanations:["WRONG \u2014 Power set of a finite set is still finite \u2192 decidable.","CORRECT \u2014 Finite \u2192 decidable \u2192 complement is also decidable.","CORRECT \u2014 Every finite set is decidable \u2192 recognizable.","WRONG \u2014 Undecidable does NOT mean complement is unrecognizable. Example: \u0100_TM is undecidable, but its complement (A_TM) IS recognizable.","WRONG \u2014 Recognizable languages are NOT closed under complement. Example: A_TM is recognizable but \u0100_TM is not.","CORRECT \u2014 Primes are decidable \u2192 both recognizable and co-recognizable."]},{section:"Decidability & Recognizability",type:"multi",question:"Select every language that is Turing-recognizable: (Select all that apply)",options:["\u0112Q_TM (complement of EQ_TM)","The language L containing only the single string w, where w=1 if Kazakhstan wins FIFA World Cup someday, else w=0","\u0100_TM (complement of A_TM)","EQ_TM = { \u27E8M\u2081, M\u2082\u27E9 | L(M\u2081) = L(M\u2082) }","E_CFG = { \u27E8G\u27E9 | G is a CFG and L(G)=\u2205 }","L\u2081 = { \u27E8R,S\u27E9 | R,S are regular expressions and L(R) \u2286 L(S) }","A_TM = { \u27E8M,w\u27E9 | M is a TM and M accepts w }"],correct:[0,1,4,5,6],explanations:["CORRECT \u2014 \u0112Q_TM asks \u201Care L(M\u2081) and L(M\u2082) different?\u201D You can find a difference by running both on all strings in parallel.","CORRECT \u2014 No matter what w actually is, L contains exactly one string \u2192 finite \u2192 decidable \u2192 recognizable.","WRONG \u2014 \u0100_TM is NOT recognizable. If it were, combined with A_TM being recognizable, A_TM would be decidable \u2014 contradiction.","WRONG \u2014 EQ_TM is neither recognizable nor co-recognizable.","CORRECT \u2014 E_CFG is decidable \u2192 recognizable.","CORRECT \u2014 Regular expression containment is decidable \u2192 recognizable.","CORRECT \u2014 A_TM is recognizable: just simulate M on w."]},{section:"Mapping Reductions",type:"multi",question:"Let A and B be two languages. If A \u2264\u2098 B, which statements are TRUE? (Select all that apply)",options:["If A is undecidable, then B is undecidable","If B is decidable, then A is Turing-recognizable","If B is not Turing-recognizable, then A is undecidable","If A is Turing-recognizable, then B is Turing-recognizable","If A is not Turing-recognizable, then B is undecidable","If A is decidable, then B is decidable"],correct:[0,1,4],explanations:["CORRECT \u2014 A undecidable + A \u2264\u2098 B \u2192 B must be undecidable. Hardness transfers UP.","CORRECT \u2014 B decidable \u2192 A decidable \u2192 A recognizable. Easiness transfers DOWN.","WRONG \u2014 The correct direction is: A not rec \u2192 B not rec. Going from B to A doesn\u2019t work for hardness.","WRONG \u2014 Easiness goes DOWN (from B to A), not UP (from A to B).","CORRECT \u2014 A not recognizable \u2192 B not recognizable \u2192 B is undecidable.","WRONG \u2014 A being decidable says nothing about B. B could be anything harder."]},{section:"Mapping Reductions",type:"single",question:"If \u0100 \u2264\u2098 \u0100, we can conclude that:",options:["\u0100 \u2264\u2098 B","A \u2264\u2098 B","B\u0304 \u2264\u2098 A","B \u2264\u2098 A"],correct:1,explanations:["WRONG \u2014 You can\u2019t just drop one complement.","CORRECT \u2014 Flipping both complements preserves the reduction with the same function.","WRONG \u2014 Reductions don\u2019t reverse direction.","WRONG \u2014 Reductions don\u2019t reverse direction."]},{section:"Countability",type:"multi",question:"Select every UNCOUNTABLE set: (Select all that apply)",options:["The set of all infinite sequences over {0,1}","The set of all points in the plane with integer coordinates","The power set of the set of all positive integers divisible by 3","The set of all real numbers in the interval (-1,1)","The power set of {0,1,2,3,...,100}"],correct:[0,2,3],explanations:["CORRECT \u2014 Infinite binary sequences have the same cardinality as \u211D \u2192 uncountable.","WRONG \u2014 \u2124 \u00D7 \u2124 is countable (you can list integer pairs).","CORRECT \u2014 Multiples of 3 form a countably infinite set. By Cantor\u2019s theorem, power set of any infinite set is uncountable.","CORRECT \u2014 Real numbers in any interval are uncountable (same cardinality as \u211D).","WRONG \u2014 {0,...,100} is finite, so its power set has 2\u00B9\u2070\u00B9 elements \u2014 huge but FINITE \u2192 countable."]},{section:"Classify Languages",type:"single",question:"F \u222A \u0100_TM, where F is an arbitrary finite language. This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:2,explanations:["WRONG \u2014 \u0100_TM is undecidable, adding finite F can\u2019t fix that.","WRONG \u2014 It\u2019s worse than just \u201Cnot decidable\u201D \u2014 it\u2019s not even recognizable.","CORRECT \u2014 \u0100_TM is not recognizable. Adding a finite set F doesn\u2019t help."]},{section:"Classify Languages",type:"single",question:"\u0100\u2081 \u222A F\u2082, where F\u2081 and F\u2082 are both finite languages. This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:0,explanations:["CORRECT \u2014 F\u2081 finite \u2192 \u0100\u2081 is co-finite. Union of co-finite and finite = co-finite or \u03A3*. Regular \u2192 decidable.","WRONG \u2014 It\u2019s actually decidable (even regular).","WRONG \u2014 It\u2019s decidable."]},{section:"Classify Languages",type:"single",question:"{ w \u2208 {0,1}* | w is binary representation of a prime number }. This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:0,explanations:["CORRECT \u2014 Primality testing is decidable \u2014 algorithms like AKS always halt.","WRONG \u2014 You can always halt and give an answer for primality.","WRONG \u2014 It\u2019s decidable."]},{section:"Classify Languages",type:"single",question:"A\u22653 = { \u27E8M\u27E9 | M accepts at least three different strings }. This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:1,explanations:["WRONG \u2014 You can\u2019t say NO if M loops.","CORRECT \u2014 Dovetail M on all strings. If you find 3 accepted \u2192 accept. Not decidable: if M accepts fewer than 3, you\u2019ll never know.","WRONG \u2014 You CAN recognize it by parallel search."]},{section:"Classify Languages",type:"single",question:"{ \u27E8M,w\u27E9 | \u27E8M,w\u27E9 is one of the first 500 elements of \u0100_TM }. This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:0,explanations:["CORRECT \u2014 At most 500 elements \u2192 FINITE. Every finite language is decidable.","WRONG \u2014 Finite = decidable, not just recognizable.","WRONG \u2014 Finite languages are always decidable."]},{section:"Classify Languages",type:"single",question:"EQ_TM = { \u27E8M\u2081,M\u2082\u27E9 | L(M\u2081) = L(M\u2082) }. This language is:",options:["Decidable","Recognizable, but not decidable","Co-recognizable, but not recognizable","Neither recognizable nor co-recognizable"],correct:3,explanations:["WRONG \u2014 Far from decidable.","WRONG \u2014 It\u2019s not even recognizable.","WRONG \u2014 It\u2019s not co-recognizable either.","CORRECT \u2014 EQ_TM is neither recognizable nor co-recognizable."]},{section:"Classify Languages",type:"single",question:"\u0112Q_TM (complement of EQ_TM). This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:1,explanations:["WRONG \u2014 You can\u2019t confirm they\u2019re equal.","CORRECT \u2014 Run M\u2081 and M\u2082 on all strings in parallel. If you find a string where they differ \u2192 accept.","WRONG \u2014 You CAN recognize differences."]},{section:"Classify Languages",type:"single",question:"A_PRIME30 = { \u27E8M\u27E9 | M accepts the first 30 prime numbers } (M might also accept other strings). This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:1,explanations:["WRONG \u2014 M might loop on a prime.","CORRECT \u2014 Run M on each of the 30 primes in parallel. If all 30 eventually accepted \u2192 yes. Not decidable: if M loops on one, you can never say no.","WRONG \u2014 You can recognize by parallel simulation."]},{section:"Classify Languages",type:"single",question:"A_INF = { \u27E8M\u27E9 | M accepts an infinite number of strings }. This language is:",options:["Decidable","Recognizable, but not decidable","Not recognizable"],correct:2,explanations:["WRONG \u2014 Can\u2019t even recognize it.","WRONG \u2014 It\u2019s not recognizable at all.","CORRECT \u2014 You can never confirm \u201Cinfinitely many.\u201D A recognizer for A_INF could build a recognizer for \u0100_TM (impossible)."]},{section:"Properties of Languages",type:"multi",question:"L = Fibonacci numbers in binary over {0,1}. Select ALL that apply:",options:["The language is recognizable","The language is decidable","The complement of the language is recognizable","The complement of the language is decidable"],correct:[0,1,2,3],explanations:["CORRECT \u2014 Decidable \u2192 recognizable.","CORRECT \u2014 Fibonacci numbers are computable \u2014 you can generate them and check membership.","CORRECT \u2014 Decidable \u2192 complement is decidable \u2192 recognizable.","CORRECT \u2014 Decidable \u2192 complement is decidable."]},{section:"Properties of Languages",type:"multi",question:"L = even length strings over {a,b,c}. Select ALL that apply:",options:["The language is decidable","The language is regular","The complement of the language is recognizable","The complement of the language is regular"],correct:[0,1,2,3],explanations:["CORRECT \u2014 Regular \u2192 decidable.","CORRECT \u2014 Even-length strings \u2192 2-state DFA.","CORRECT \u2014 Complement = odd-length \u2192 regular \u2192 decidable \u2192 recognizable.","CORRECT \u2014 Complement = odd-length strings \u2192 also regular."]},{section:"Properties of Languages",type:"multi",question:"L = valid \u27E8M,w\u27E9 encodings with length > 100. Select ALL that apply:",options:["The language is decidable","The complement of the language is recognizable","The language is recognizable but not decidable","The complement is not recognizable"],correct:[0,1],explanations:["CORRECT \u2014 Checking valid TM encoding AND length > 100 is purely syntactic \u2014 decidable.","CORRECT \u2014 Decidable \u2192 complement is decidable \u2192 recognizable.","WRONG \u2014 It IS decidable, not just recognizable.","WRONG \u2014 Complement is decidable \u2192 recognizable."]},{section:"Properties of Languages",type:"multi",question:"N is NOT recognizable. Which MUST be true? (Select all that apply)",options:["N \u2229 F is decidable for any finite language F","N \u222A \u03A3* is decidable","The complement of N is recognizable","N is undecidable"],correct:[0,1,3],explanations:["CORRECT \u2014 Intersection of anything with a finite set \u2192 finite \u2192 decidable.","CORRECT \u2014 N \u222A \u03A3* = \u03A3* \u2192 decidable.","WRONG \u2014 Complement of unrecognizable is NOT necessarily recognizable.","CORRECT \u2014 If N were decidable, it would be recognizable (contradiction)."]},{section:"Rice's Theorem",type:"single",question:"Can Rice\u2019s theorem prove that L = { \u27E8M\u27E9 | M has at least 5 states } is undecidable?",options:["Yes \u2014 it satisfies both conditions","No \u2014 this is a property of the MACHINE, not its language","No \u2014 the property is trivial"],correct:1,explanations:["WRONG \u2014 It\u2019s a machine property, not a language property.","CORRECT \u2014 Rice\u2019s theorem only works for properties of the LANGUAGE L(M), not the machine M itself. This language IS decidable \u2014 just count states in the encoding.","WRONG \u2014 It IS nontrivial, but that\u2019s not the issue."]},{section:"Rice's Theorem",type:"single",question:"Can Rice\u2019s theorem prove that INFINITE_TM = { \u27E8M\u27E9 | L(M) is infinite } is undecidable?",options:["Yes \u2014 nontrivial property of the language","No \u2014 property of the machine","No \u2014 the property is trivial"],correct:0,explanations:["CORRECT \u2014 Nontrivial: some TMs have infinite languages, some don\u2019t. Property of the language: if L(M\u2081)=L(M\u2082), both are infinite or both aren\u2019t. Rice\u2019s theorem applies.","WRONG \u2014 \u201CL(M) is infinite\u201D is about the language, not the machine.","WRONG \u2014 It\u2019s nontrivial (not all TMs have infinite languages)."]},{section:"Rice's Theorem",type:"single",question:"Can Rice\u2019s theorem prove that L = { \u27E8M\u27E9 | 0110 \u2208 L(M) } is undecidable?",options:["Yes \u2014 nontrivial property of the language","No \u2014 property of the machine","No \u2014 trivial property"],correct:0,explanations:["CORRECT \u2014 Nontrivial: some TMs accept 0110, some don\u2019t. Property of the language: if L(M\u2081)=L(M\u2082), then 0110 \u2208 L(M\u2081) iff 0110 \u2208 L(M\u2082).","WRONG \u2014 \u201C0110 \u2208 L(M)\u201D is about the language.","WRONG \u2014 The property is nontrivial."]},{section:"Reduction Proofs",type:"single",question:"To prove HALT_TM is undecidable, we assume it\u2019s decidable and build a decider for:",options:["E_TM","A_TM","EQ_TM","HALT_TM itself"],correct:1,explanations:["WRONG \u2014 E_TM is a different reduction.","CORRECT \u2014 We reduce A_TM to HALT_TM. Assume H decides HALT_TM. Build decider for A_TM: check if M halts on w, if not \u2192 reject, if yes \u2192 run M on w, return its answer.","WRONG \u2014 EQ_TM is proven undecidable differently.","WRONG \u2014 We build a decider for A_TM, not HALT_TM."]},{section:"Reduction Proofs",type:"single",question:"In the proof that E_TM is undecidable, we construct helper TM M\u2032. What does M\u2032 do on input x?",options:["Accepts everything","Rejects everything","If x\u2260w reject; if x=w run M on w, accept if M accepts","Ignores x, runs M on w, accepts if M accepts"],correct:2,explanations:["WRONG \u2014 That would make L(M\u2032)=\u03A3* always.","WRONG \u2014 That would make L(M\u2032)=\u2205 always.","CORRECT \u2014 So L(M\u2032)={w} if M accepts w, and L(M\u2032)=\u2205 if M doesn\u2019t. Then check if L(M\u2032) is empty using E_TM decider.","WRONG \u2014 This is a different construction (used for EQ_TM proof)."]},{section:"Reduction Proofs",type:"single",question:"For the mapping reduction A_TM \u2264\u2098 HALT_TM, what does M\u2032 do on input x?",options:["Run M on x; if M accepts\u2192accept; if M rejects\u2192loop forever","Run M on w; accept if M halts","Ignore x and accept","Run M on w; if accepts\u2192reject; if rejects\u2192accept"],correct:0,explanations:["CORRECT \u2014 M\u2032 simulates M on x. If M accepts \u2192 accept. If M rejects \u2192 loop forever. So \u27E8M,w\u27E9 \u2208 A_TM iff \u27E8M\u2032,w\u27E9 \u2208 HALT_TM.","WRONG \u2014 M\u2032 should work on its own input x, not just w.","WRONG \u2014 This doesn\u2019t connect to M\u2019s behavior.","WRONG \u2014 Flipping accept/reject doesn\u2019t help here."]},{section:"Closure Properties",type:"multi",question:"Which of the following are TRUE? (Select all that apply)",options:["If A is mapping reducible to B and B is undecidable, then A is also undecidable","The class of Turing-recognizable languages is closed under union","There is a Python program that for every NFA N, can determine whether L(N) is empty","If A \u2264\u2098 B and B is Turing-recognizable, then A is also Turing-recognizable","One can write a C++ program that checks whether two C++ programs produce the same answers on all inputs","There exists a language that is Turing-recognizable but not co-Turing-recognizable"],correct:[1,2,3,5],explanations:["WRONG \u2014 Direction is wrong. B undecidable doesn\u2019t mean A is undecidable. Hardness goes UP (from A to B), not down.","CORRECT \u2014 Recognizable is closed under union.","CORRECT \u2014 NFA emptiness is decidable.","CORRECT \u2014 B recognizable + A \u2264\u2098 B \u2192 A recognizable.","WRONG \u2014 Program equivalence is undecidable (like EQ_TM / Rice\u2019s theorem).","CORRECT \u2014 A_TM is recognizable but not co-recognizable."]},{section:"Conceptual",type:"multi",question:"Which statements are TRUE? (Select all that apply)",options:["A nondeterministic TM can be simulated by a deterministic TM with only one tape","If a language is decidable then it is also Turing-recognizable","A language that is regular is always decidable","A nondeterministic TM can be simulated by a deterministic TM with three tapes","A language that is not context-free is always undecidable"],correct:[0,1,2,3],explanations:["CORRECT \u2014 NTMs can be simulated by DTMs with any number of tapes.","CORRECT \u2014 Decidable \u2192 recognizable always.","CORRECT \u2014 Regular \u2192 decidable always.","CORRECT \u2014 Standard 3-tape simulation of NTMs works.","WRONG \u2014 Example: {a\u207Fb\u207Fc\u207F} is not context-free but IS decidable."]},{section:"DFA Problems",type:"single",question:"INFINITE_DFA = { \u27E8D\u27E9 | D is a DFA and L(D) is infinite }. Is this decidable?",options:["Yes \u2014 check if DFA has a reachable cycle leading to an accept state","No \u2014 by Rice\u2019s theorem","No \u2014 by reduction from A_TM"],correct:0,explanations:["CORRECT \u2014 DFAs are simple enough to analyze. Rice\u2019s theorem does NOT apply to DFAs \u2014 only to TMs.","WRONG \u2014 Rice\u2019s theorem is about TMs, not DFAs.","WRONG \u2014 This is decidable."]},{section:"Reduction Proofs",type:"single",question:"Is \u0100_TM \u2264\u2098 E_TM possible?",options:["Yes \u2014 both are about TMs","No \u2014 E\u0304_TM is recognizable, so this would make \u0100_TM recognizable, contradiction","No \u2014 E_TM is decidable"],correct:1,explanations:["WRONG \u2014 \u201CBoth about TMs\u201D doesn\u2019t mean a reduction exists.","CORRECT \u2014 E_TM is co-recognizable. If \u0100_TM \u2264\u2098 E_TM, then \u0100_TM would also be co-recognizable, creating contradictions.","WRONG \u2014 E_TM is NOT decidable."]},{section:"Mapping Reductions",type:"single",question:"If A \u2264\u2098 B and B is regular, does that imply A is regular?",options:["Yes \u2014 regularity transfers through reductions","No \u2014 A could be any decidable language, not necessarily regular","No \u2014 A must be undecidable"],correct:1,explanations:["WRONG \u2014 Regularity is not preserved by mapping reductions.","CORRECT \u2014 Mapping reductions only preserve decidability and recognizability, NOT regularity.","WRONG \u2014 A could be decidable but not regular."]},{section:"Conceptual",type:"single",question:"A Turing machine that simulates other Turing machines is called:",options:["Deterministic TM","Multi-tape TM","Universal TM","Nondeterministic TM"],correct:2,explanations:["WRONG \u2014 Deterministic just means no branching.","WRONG \u2014 Multi-tape is about hardware, not simulation.","CORRECT \u2014 A Universal Turing Machine takes the description of another TM and its input, then simulates that TM.","WRONG \u2014 Nondeterministic means branching choices."]}];

const STORAGE_KEY='csci272_quiz_v1';
let state=loadState();

function loadState(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return{current:0,answers:[],submitted:[],score:0,done:false};
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}

function init(){
  if(state.submitted.length>0){
    document.getElementById('resetBtn').classList.remove('hidden');
  }
  if(state.done){showResults();document.getElementById('startScreen').classList.add('hidden');return;}
  if(state.submitted.length>0&&!state.done){
    document.getElementById('startScreen').querySelector('h2').textContent='Continue?';
    document.getElementById('startScreen').querySelector('p').textContent=`You answered ${state.submitted.length}/30 questions. Pick up where you left off.`;
    document.getElementById('startScreen').querySelector('.btn-primary').textContent='Continue';
  }
  updateProgress();
}

function startQuiz(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  renderQuestion(state.current);
}

function resetQuiz(){
  if(!confirm('Reset all progress?'))return;
  state={current:0,answers:[],submitted:[],score:0,done:false};
  saveState();location.reload();
}

function updateProgress(){
  const n=state.submitted.length;
  document.getElementById('progressFill').style.width=(n/30*100)+'%';
  document.getElementById('progressText').textContent=n+' / 30';
}

function renderQuestion(idx){
  if(idx>=QUESTIONS.length){finishQuiz();return;}
  const q=QUESTIONS[idx];
  const isMulti=q.type==='multi';
  const alreadySubmitted=state.submitted[idx]===true;
  const prevAnswer=state.answers[idx]||[];
  let html=`<div class="card">
    <div class="q-section">${q.section}</div>
    <div class="q-number">Question ${idx+1} of 30<span class="q-type ${q.type}">${isMulti?'Select all that apply':'Select one'}</span></div>
    <div class="q-text">${q.question}</div>`;
  const correctArr=Array.isArray(q.correct)?q.correct:[q.correct];
  q.options.forEach((opt,i)=>{
    const inputType=isMulti?'checkbox':'radio';
    const checked=prevAnswer.includes(i)?'checked':'';
    let cls='option';
    if(alreadySubmitted){
      cls+=' locked';
      if(correctArr.includes(i)&&prevAnswer.includes(i))cls+=' correct';
      else if(prevAnswer.includes(i)&&!correctArr.includes(i))cls+=' wrong';
      else if(correctArr.includes(i)&&!prevAnswer.includes(i))cls+=' missed';
    }
    html+=`<label class="${cls}" id="opt${idx}_${i}">
      <input type="${inputType}" name="q${idx}" value="${i}" ${checked} ${alreadySubmitted?'disabled':''} onchange="selectOption(${idx},${i},${isMulti})">
      <span class="option-label">${opt}</span>
    </label>`;
  });
  let expHtml='';
  q.explanations.forEach((e,i)=>{
    const icon=correctArr.includes(i)?'\u2705':'\u274C';
    expHtml+=`<div style="margin-bottom:6px;">${icon} <strong>${String.fromCharCode(97+i)})</strong> ${e}</div>`;
  });
  html+=`<div class="explanation ${alreadySubmitted?'show':''}" id="exp${idx}">${expHtml}</div>`;
  html+=`<div class="btn-row">`;
  if(!alreadySubmitted){
    html+=`<button class="btn btn-primary" id="submitBtn" onclick="submitAnswer(${idx})" disabled>Submit Answer</button>`;
  }
  if(alreadySubmitted&&idx<QUESTIONS.length-1){
    html+=`<button class="btn btn-primary" onclick="goNext(${idx})">Next Question \u2192</button>`;
  }else if(alreadySubmitted&&idx===QUESTIONS.length-1){
    html+=`<button class="btn btn-primary" onclick="finishQuiz()">See Results</button>`;
  }
  if(idx>0){
    html+=`<button class="btn btn-secondary" onclick="goPrev(${idx})">\u2190 Previous</button>`;
  }
  html+=`</div></div>`;
  document.getElementById('questionArea').innerHTML=html;
  state.current=idx;saveState();updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectOption(qIdx,optIdx,isMulti){
  if(!state.answers[qIdx])state.answers[qIdx]=[];
  if(isMulti){
    const pos=state.answers[qIdx].indexOf(optIdx);
    if(pos>-1)state.answers[qIdx].splice(pos,1);else state.answers[qIdx].push(optIdx);
  }else{
    state.answers[qIdx]=[optIdx];
  }
  const btn=document.getElementById('submitBtn');
  if(btn)btn.disabled=state.answers[qIdx].length===0;
  saveState();
}

function submitAnswer(idx){
  const q=QUESTIONS[idx];
  const correctArr=Array.isArray(q.correct)?q.correct:[q.correct];
  const answer=state.answers[idx]||[];
  const isCorrect=correctArr.length===answer.length&&correctArr.every(c=>answer.includes(c));
  state.submitted[idx]=true;
  if(isCorrect)state.score++;
  saveState();
  renderQuestion(idx);
}

function goNext(idx){renderQuestion(idx+1);}
function goPrev(idx){renderQuestion(idx-1);}

function finishQuiz(){
  state.done=true;saveState();updateProgress();
  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('startScreen').classList.add('hidden');
  const area=document.getElementById('resultsArea');
  area.classList.remove('hidden');
  const pct=Math.round(state.score/30*100);
  let html=`<div class="card results-card">
    <div class="score-big">${state.score}/30</div>
    <div class="score-label">${pct}% — ${pct>=90?'Excellent!':pct>=70?'Good job!':pct>=50?'Keep studying!':'Review the material'}</div>
    <div class="btn-row" style="justify-content:center; margin-bottom:20px;">
      <button class="btn btn-primary" onclick="reviewMistakes()">Review Mistakes</button>
      <button class="btn btn-secondary" onclick="reviewAll()">Review All</button>
      <button class="btn btn-danger" onclick="resetQuiz()">Start Over</button>
    </div>`;
  QUESTIONS.forEach((q,i)=>{
    const correctArr=Array.isArray(q.correct)?q.correct:[q.correct];
    const answer=state.answers[i]||[];
    const ok=correctArr.length===answer.length&&correctArr.every(c=>answer.includes(c));
    html+=`<div class="result-item">
      <span class="result-icon">${ok?'\u2705':'\u274C'}</span>
      <span class="result-text"><strong>Q${i+1}</strong> ${q.question.substring(0,60)}${q.question.length>60?'...':''}</span>
      <button class="btn btn-secondary" style="padding:4px 10px;font-size:12px;" onclick="reviewOne(${i})">View</button>
    </div>`;
  });
  html+=`</div>`;
  area.innerHTML=html;
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressText').textContent='30 / 30 — Done!';
}

function reviewMistakes(){
  const wrong=[];
  QUESTIONS.forEach((q,i)=>{
    const ca=Array.isArray(q.correct)?q.correct:[q.correct];
    const a=state.answers[i]||[];
    if(!(ca.length===a.length&&ca.every(c=>a.includes(c))))wrong.push(i);
  });
  if(wrong.length===0){alert('No mistakes! Perfect score!');return;}
  document.getElementById('resultsArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  state._reviewList=wrong;state._reviewIdx=0;
  renderQuestion(wrong[0]);
}

function reviewAll(){
  document.getElementById('resultsArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  renderQuestion(0);
}

function reviewOne(idx){
  document.getElementById('resultsArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  renderQuestion(idx);
}

init();
</script>
</body>
</html>
